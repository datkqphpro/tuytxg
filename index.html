
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
text-align:center;
overflow:hidden;
}

h1{color:white;margin-top:20px;}
p{color:white;}

.photo{
position:absolute;
width:90px;
height:90px;
border-radius:15px;
object-fit:cover;
box-shadow:0 8px 20px rgba(0,0,0,0.3);

opacity:0;
transform:scale(0.4);
transition:1s;
}

.photo.show{
opacity:1;
transform:scale(1);
}

/* trôi nổi */

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0px);}

}

.float{
animation:float 5s ease-in-out infinite;
}

.petal{
position:fixed;
top:-60px;
width:70px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-10vh) translateX(0px) rotate(0deg);
}

50%{
transform:translateY(50vh) translateX(120px) rotate(180deg);
}

100%{
transform:translateY(110vh) translateX(-120px) rotate(360deg);
}

}

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:explode 1s forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

@media (max-width:600px){

.photo{
width:65px;
height:65px;
}

.petal{
width:40px;
}

}

</style>

</head>

<body>

<h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>
<p>Chúc Tuýt luôn xinh đẹp và hạnh phúc 💖</p>

<img src="1.PNG" class="photo">
<img src="2.PNG" class="photo">
<img src="3.PNG" class="photo">
<img src="4.PNG" class="photo">
<img src="5.PNG" class="photo">
<img src="6.PNG" class="photo">
<img src="7.PNG" class="photo">
<img src="8.PNG" class="photo">
<img src="9.PNG" class="photo">

<audio id="music" autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const images=document.querySelectorAll(".photo");

images.forEach((img,i)=>{

const x=Math.random()*90;
const y=Math.random()*80;

img.style.left=x+"vw";
img.style.top=y+"vh";

setTimeout(()=>{

img.classList.add("show");
img.classList.add("float");

if(i===images.length-1){
createFirework();
}

},i*600);

});

function createPetal(){

for(let i=0;i<3;i++){

const petal=document.createElement("img");

petal.src="petal.png";
petal.className="petal";

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*4+5)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),10000);

}

}

setInterval(createPetal,120);

function createFirework(){

for(let i=0;i<100;i++){

const f=document.createElement("div");

f.className="firework";

const x=(Math.random()-0.5)*600+"px";
const y=(Math.random()-0.5)*600+"px";

f.style.left="50%";
f.style.top="50%";

f.style.setProperty("--x",x);
f.style.setProperty("--y",y);

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

document.body.addEventListener("click",()=>{
document.getElementById("music").play();
});

</script>

</body>
</html>
