<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
text-align:center;
overflow:hidden;
}

h1{
color:white;
margin-top:25px;
}

p{
color:white;
}

/* vòng tròn */

.circle{
position:relative;
width:500px;
height:500px;
margin:40px auto;
animation:spin 25s linear infinite;
}

/* ảnh */

.circle img{
position:absolute;
width:90px;
height:90px;
object-fit:cover;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.25);

opacity:0;
transform:scale(0.3);
transition:0.8s;
}

.circle img.show{
opacity:1;
transform:scale(1);
}

/* xoay */

@keyframes spin{
from{ transform:rotate(0deg); }
to{ transform:rotate(360deg); }
}

/* hoa rơi */

.flower{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
0%{ transform:translateY(-10vh); }
100%{ transform:translateY(110vh); }
}

/* mobile */

@media (max-width:600px){

.circle{
width:340px;
height:340px;
}

.circle img{
width:70px;
height:70px;
}

}

</style>

</head>

<body>

<h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>
<p>Chúc Tuýt luôn xinh đẹp và hạnh phúc 💖</p>

<div class="circle">

<img src="1.PNG">
<img src="2.PNG">
<img src="3.PNG">
<img src="4.PNG">
<img src="5.PNG">
<img src="6.PNG">
<img src="7.PNG">
<img src="8.PNG">
<img src="9.PNG">

</div>

<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

const images=document.querySelectorAll(".circle img");

const radius=200;
const center=250;

images.forEach((img,i)=>{

const angle=(i/9)*Math.PI*2;

const x=center+radius*Math.cos(angle)-45;
const y=center+radius*Math.sin(angle)-45;

img.style.left=x+"px";
img.style.top=y+"px";

setTimeout(()=>{
img.classList.add("show");
},i*600);

});

/* hoa rơi */

function createFlower(){

const flower=document.createElement("div");
flower.classList.add("flower");
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(Math.random()*3+4)+"s";
flower.style.fontSize=(Math.random()*15+15)+"px";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),7000);

}

setInterval(createFlower,300);

</script>

</body>
</html>
