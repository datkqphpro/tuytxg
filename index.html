pointer-events:none;
}

.photo{
position:absolute;
width:90px;
height:90px;
border-radius:15px;
object-fit:cover;
box-shadow:0 8px 20px rgba(0,0,0,0.3);

opacity:0;
transform:scale(0.4);
transition:1.5s;
}

.photo.show{
opacity:1;
transform:scale(1);
}

/* trôi nổi */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.float{
animation:float 4s ease-in-out infinite;
}

/* quay vòng */

.rotate{
animation:spin 25s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.petal{
position:fixed;
top:-60px;
width:70px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-10vh) translateX(0px) rotate(0deg);
}

50%{
transform:translateY(50vh) translateX(120px) rotate(180deg);
}

100%{
transform:translateY(110vh) translateX(-120px) rotate(360deg);
}

}

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:explode 1s forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

@media (max-width:600px){

.photo{
width:65px;
height:65px;
}

}

</style>
