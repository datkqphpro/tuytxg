<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
    text-align:center;
}

h1{
    color:white;
    margin-top:30px;
    font-size:40px;
}

p{
    color:white;
    font-size:18px;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
    max-width:800px;
    margin:auto;
}

.gallery img{
    width:100%;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

footer{
    color:white;
    margin:20px;
    font-size:16px;
}

/* Mobile */
@media (max-width:600px){
    h1{
        font-size:28px;
    }
    
    .gallery{
        grid-template-columns:repeat(2,1fr);
    }
}

</style>
</head>

<body>

<h1>💐 Chúc Mừng Ngày 8/3 💐</h1>
<p>Chúc bạn luôn xinh đẹp, vui vẻ và hạnh phúc mỗi ngày ❤️</p>

<div class="gallery">

<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
<img src="5.png">
<img src="6.png">
<img src="7.png">
<img src="8.png">
<img src="9.png">

</div>

<footer>
Chúc một ngày 8/3 thật ý nghĩa 💖
</footer>

</body>
</html>
