<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
text-align:center;
overflow:hidden;
}

h1{color:white;margin-top:20px;}
p{color:white;}

/* vùng xoay */

.container{
position:relative;
width:520px;
height:520px;
margin:40px auto;
animation:rotateHeart 25s linear infinite;
}

/* xoay cả trái tim */

@keyframes rotateHeart{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* ảnh giữa */

.center{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:150px;
height:150px;
border-radius:20px;
box-shadow:0 0 20px white;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px white;}
to{box-shadow:0 0 40px white;}
}

/* ảnh tim */

.orbit{
position:absolute;
width:90px;
height:90px;
border-radius:15px;
object-fit:cover;
box-shadow:0 5px 15px rgba(0,0,0,0.3);

opacity:0;
transform:scale(0.3);
transition:1s;
}

.orbit.show{
opacity:1;
transform:scale(1);
}

/* hoa đào */

.petal{
position:fixed;
top:-60px;
width:60px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-10vh) translateX(0px) rotate(0deg);
}
50%{
transform:translateY(50vh) translateX(60px) rotate(180deg);
}
100%{
transform:translateY(110vh) translateX(-60px) rotate(360deg);
}
}

/* pháo hoa */

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:explode 1s forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

@media (max-width:600px){

.container{
width:340px;
height:340px;
}

.center{
width:100px;
height:100px;
}

.orbit{
width:60px;
height:60px;
}

}

</style>

</head>

<body>

<h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>
<p>Chúc bạn luôn xinh đẹp và hạnh phúc 💖</p>

<div class="container">

<img src="1.PNG" class="center">

<img src="2.PNG" class="orbit">
<img src="3.PNG" class="orbit">
<img src="4.PNG" class="orbit">
<img src="5.PNG" class="orbit">
<img src="6.PNG" class="orbit">
<img src="7.PNG" class="orbit">
<img src="8.PNG" class="orbit">
<img src="9.PNG" class="orbit">

</div>

<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* tạo hình trái tim */

const images=document.querySelectorAll(".orbit");

const centerX=260;
const centerY=260;
const scale=10;

images.forEach((img,i)=>{

const t=(i/images.length)*Math.PI*2;

const x=16*Math.pow(Math.sin(t),3);
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);

img.style.left=centerX+x*scale+"px";
img.style.top=centerY-y*scale+"px";

setTimeout(()=>{
img.classList.add("show");

if(i===images.length-1){
createFirework();
}

},i*700);

});


/* hoa đào bay */

function createPetal(){

for(let i=0;i<2;i++){

const petal=document.createElement("img");

petal.src="petal.png";
petal.className="petal";

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(Math.random()*5+6)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),12000);

}

}

setInterval(createPetal,150);


/* pháo hoa */

function createFirework(){

for(let i=0;i<90;i++){

const f=document.createElement("div");

f.className="firework";

const x=(Math.random()-0.5)*500+"px";
const y=(Math.random()-0.5)*500+"px";

f.style.left="50%";
f.style.top="50%";

f.style.setProperty("--x",x);
f.style.setProperty("--y",y);

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

}

}

</script>

</body>
</html>
